<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#121212" />
    <link rel="icon" href="../favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <title>Diagrams · Scenes</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #121212;
        color: #e7e7ea;
        font-family: "Assistant", ui-sans-serif, system-ui, -apple-system,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.5;
        display: flex;
        justify-content: center;
      }
      main {
        width: 100%;
        max-width: 640px;
        padding: 48px 24px 96px;
      }
      header {
        margin-bottom: 28px;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin: 0 0 6px;
        letter-spacing: -0.01em;
      }
      .subtitle {
        margin: 0;
        color: #9b9ba3;
        font-size: 0.95rem;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      a.scene {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid #2c2c31;
        border-radius: 10px;
        background: #1a1a1d;
        color: #e7e7ea;
        text-decoration: none;
        transition: border-color 0.12s ease, background 0.12s ease,
          transform 0.06s ease;
      }
      a.scene:hover {
        border-color: #6965db;
        background: #202024;
      }
      a.scene:active {
        transform: translateY(1px);
      }
      .dot {
        flex: 0 0 auto;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6965db;
      }
      .name {
        font-weight: 600;
        font-size: 1.02rem;
      }
      .arrow {
        margin-left: auto;
        color: #6d6d76;
        font-size: 1.1rem;
      }
      .state {
        color: #9b9ba3;
        font-size: 0.95rem;
        padding: 20px 4px;
      }
      .state code {
        background: #202024;
        border-radius: 5px;
        padding: 1px 6px;
        color: #cfcfd6;
        font-family: ui-monospace, "Cascadia", "Comic Shanns", monospace;
        font-size: 0.85em;
      }
      footer {
        margin-top: 36px;
        color: #6d6d76;
        font-size: 0.85rem;
      }
      footer a {
        color: #8f8bea;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Scenes</h1>
        <p class="subtitle">
          Saved diagrams. Open one to edit it in the whiteboard.
        </p>
      </header>

      <ul id="list" hidden></ul>
      <p class="state" id="state">Loading scenes…</p>

      <footer>
        Add a scene by dropping a <code>.excalidraw</code> file into the
        scenes directory (see <code>publish-scene.sh</code>).
        <a href="../">Open a blank canvas →</a>
      </footer>
    </main>

    <script>
      (function () {
        var listEl = document.getElementById("list");
        var stateEl = document.getElementById("state");

        function setState(msg) {
          stateEl.textContent = msg;
          stateEl.hidden = false;
          listEl.hidden = true;
        }

        function prettify(name) {
          return name
            .replace(/[-_]+/g, " ")
            .replace(/\b\w/g, function (c) {
              return c.toUpperCase();
            });
        }

        // The JSON directory listing lives at a sibling autoindex endpoint so
        // it never collides with this index.html. Base-path agnostic: from
        // /diagrams/scenes/ this resolves to /diagrams/scene-list/.
        fetch("../scene-list/", { headers: { Accept: "application/json" } })
          .then(function (res) {
            if (!res.ok) {
              throw new Error("listing " + res.status);
            }
            return res.json();
          })
          .then(function (entries) {
            var scenes = (entries || [])
              .filter(function (e) {
                return (
                  e &&
                  e.type === "file" &&
                  typeof e.name === "string" &&
                  e.name.toLowerCase().endsWith(".excalidraw")
                );
              })
              .map(function (e) {
                return e.name.replace(/\.excalidraw$/i, "");
              })
              .sort(function (a, b) {
                return a.localeCompare(b);
              });

            if (!scenes.length) {
              setState("No scenes yet.");
              return;
            }

            listEl.innerHTML = "";
            scenes.forEach(function (name) {
              var li = document.createElement("li");
              var a = document.createElement("a");
              a.className = "scene";
              // Editable deep-link into the whiteboard: /diagrams/?scene=<name>
              a.href = "../?scene=" + encodeURIComponent(name);

              var dot = document.createElement("span");
              dot.className = "dot";

              var label = document.createElement("span");
              label.className = "name";
              label.textContent = prettify(name);

              var arrow = document.createElement("span");
              arrow.className = "arrow";
              arrow.textContent = "→";

              a.appendChild(dot);
              a.appendChild(label);
              a.appendChild(arrow);
              li.appendChild(a);
              listEl.appendChild(li);
            });

            stateEl.hidden = true;
            listEl.hidden = false;
          })
          .catch(function () {
            setState("Could not load the scene list.");
          });
      })();
    </script>
  </body>
</html>
