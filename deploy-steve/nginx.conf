# Excalidraw static SPA -> https://labs.voxen.dev/diagrams
# Traefik strips the /diagrams prefix, so nginx serves everything from root.
# The build was compiled with Vite base=/diagrams/, so the browser still
# requests /diagrams/assets/... (Traefik rebases to /assets/... for us).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json font/woff2;

    # Service worker + entry html must never be cached (autoUpdate PWA)
    location = /sw.js            { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
    location = /index.html       { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Content-hashed assets are immutable -> cache hard
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # voxen: scenes. /diagrams/scenes/ serves the dark scene-index page; the
    # app fetches raw .excalidraw files from under here. Kept out of the SPA
    # fallback so a missing scene returns a real 404 (-> graceful toast in the
    # app) instead of 200-with-HTML. The scenes dir is deployed separately from
    # the app build (rsync excludes scenes/), so republishing the app never
    # clobbers it.
    location = /scenes/ {
        try_files /scenes/index.html =404;
    }
    location /scenes/ {
        try_files $uri =404;
    }

    # voxen: JSON directory listing of the scenes dir, fetched by the
    # scene-index page to enumerate scenes with zero maintenance (drop a
    # .excalidraw in -> it shows up, no rebuild). A separate path from
    # /scenes/ so it never collides with scenes/index.html; `index` is pointed
    # at a nonexistent file so autoindex fires despite that index.html.
    location /scene-list/ {
        alias /usr/share/nginx/html/scenes/;
        autoindex on;
        autoindex_format json;
        index __force_autoindex__;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }
}
